<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node.js Чат с файлами</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .chat-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 15px;
            border-radius: 15px;
            max-width: 70%;
            word-wrap: break-word;
            position: relative;
        }

        .message.user {
            background: #3b82f6;
            color: white;
            margin-left: auto;
        }

        .message.system {
            background: #e2e8f0;
            color: #475569;
            text-align: center;
            max-width: 90%;
            margin: 10px auto;
            font-style: italic;
        }

        .message.other {
            background: #f1f5f9;
            color: #334155;
        }

        .message.file {
            border: 2px dashed #cbd5e1;
        }

        .message-header {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .message-content {
            font-size: 1em;
            margin-bottom: 8px;
        }

        .file-preview {
            margin: 10px 0;
            border-radius: 10px;
            overflow: hidden;
        }

        .file-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .file-preview img:hover {
            transform: scale(1.02);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-top: 5px;
        }

        .file-icon {
            font-size: 24px;
        }

        .file-details {
            flex: 1;
        }

        .file-name {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .file-size {
            font-size: 0.8em;
            opacity: 0.7;
        }

        .download-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9em;
        }

        .download-btn:hover {
            background: #2563eb;
        }

        .message-time {
            font-size: 0.8em;
            opacity: 0.7;
            margin-top: 5px;
            text-align: right;
        }

        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .message-input-container {
            flex: 1;
            position: relative;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            padding-right: 40px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            font-family: Arial, sans-serif;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .file-upload-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .file-upload-btn:hover {
            transform: translateY(-2px);
        }

        .send-btn {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
        }

        .file-input {
            display: none;
        }

        .upload-progress {
            margin-top: 10px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 12px;
            color: #64748b;
            text-align: center;
        }

        .preview-container {
            margin-top: 10px;
            padding: 10px;
            border: 2px dashed #cbd5e1;
            border-radius: 10px;
            background: #f8fafc;
            display: none;
        }

        .preview-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            margin-bottom: 5px;
            background: white;
            border-radius: 5px;
        }

        .remove-preview {
            background: #ef4444;
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
        }

        .username-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #334155;
        }

        .online-users {
            padding: 10px 20px;
            background: #f1f5f9;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
            color: #64748b;
            flex-shrink: 0;
        }

        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        .drag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(59, 130, 246, 0.8);
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            z-index: 1500;
            pointer-events: none;
        }

        .drag-overlay i {
            font-size: 48px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .chat-container {
                height: 95vh;
                max-width: 100%;
            }
            
            .message {
                max-width: 85%;
            }
            
            .input-wrapper {
                flex-direction: column;
            }
            
            .file-upload-btn, .send-btn {
                width: 100%;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div id="dragOverlay" class="drag-overlay">
        <div style="text-align: center;">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Перетащите файлы сюда</p>
        </div>
    </div>

    <div id="imageModal" class="image-modal">
        <button class="close-modal" onclick="closeImageModal()">×</button>
        <img id="modalImage" src="" alt="Просмотр изображения">
    </div>

    <div id="usernameModal" class="username-modal">
        <div class="modal-content">
            <h2>Добро пожаловать в чат!</h2>
            <input type="text" id="usernameInput" placeholder="Введите ваше имя" autocomplete="off">
            <button onclick="setUsername()" style="margin-top: 20px; width: 100%;">
                Войти в чат
            </button>
        </div>
    </div>

    <div class="chat-container">
        <div class="header">
            <h1><i class="fas fa-comments"></i> Node.js Чат</h1>
            <p>Общайтесь, отправляйте фото и файлы</p>
        </div>
        
        <div id="onlineUsers" class="online-users">
            <i class="fas fa-user-friends"></i> Пользователей онлайн: 1
        </div>
        
        <div class="chat-window" id="chatWindow">
            <!-- Сообщения будут здесь -->
        </div>
        
        <div class="input-area">
            <div class="preview-container" id="previewContainer"></div>
            
            <div class="upload-progress" id="uploadProgress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Загрузка 0%</div>
            </div>
            
            <div class="input-wrapper">
                <div class="message-input-container">
                    <textarea 
                        id="messageInput" 
                        placeholder="Введите сообщение или перетащите файлы..." 
                        autocomplete="off" 
                        disabled
                        rows="1"
                    ></textarea>
                    <input type="file" id="fileInput" class="file-input" multiple>
                </div>
                
                <button class="file-upload-btn" onclick="openFilePicker()" id="fileButton" disabled>
                    <i class="fas fa-paperclip"></i>
                </button>
                
                <button class="send-btn" onclick="sendMessage()" id="sendButton" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = io();
        let username = '';
        let onlineUsers = 1;
        let filesToUpload = [];
        let isDragging = false;

        // Установка имени пользователя
        function setUsername() {
            const input = document.getElementById('usernameInput');
            username = input.value.trim();
            
            if (username) {
                socket.emit('set username', username);
                document.getElementById('usernameModal').style.display = 'none';
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendButton').disabled = false;
                document.getElementById('fileButton').disabled = false;
                document.getElementById('messageInput').focus();
            }
        }

        // Открытие выбора файлов
        function openFilePicker() {
            document.getElementById('fileInput').click();
        }

        // Обработка выбора файлов
        // Обработка файлов
async function handleFiles(fileList) {
    const previewContainer = document.getElementById('previewContainer');
    previewContainer.style.display = 'block';
    
    for (let file of fileList) {
        // Проверяем размер файла (10MB максимум)
        if (file.size > 10 * 1024 * 1024) {
            alert(`Файл ${file.name} слишком большой (максимум 10MB)`);
            continue;
        }
        
        const fileId = Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        
        // Для изображений создаем превью
        if (file.type.startsWith('image/')) {
            try {
                const previewUrl = URL.createObjectURL(file);
                filesToUpload.push({
                    id: fileId,
                    file: file,
                    previewUrl: previewUrl
                });
                
                const previewItem = document.createElement('div');
                previewItem.className = 'preview-item';
                previewItem.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <img src="${previewUrl}" alt="Превью" style="width: 40px; height: 40px; object-fit: cover; border-radius: 5px;">
                        <div>
                            <div>${file.name}</div>
                            <div style="font-size: 12px; color: #64748b;">(${(file.size / 1024).toFixed(1)} KB)</div>
                        </div>
                    </div>
                    <button class="remove-preview" onclick="removeFile('${fileId}')">×</button>
                `;
                
                previewContainer.appendChild(previewItem);
            } catch (error) {
                console.error('Ошибка создания превью:', error);
                addDefaultPreview(file, fileId);
            }
        } else {
            addDefaultPreview(file, fileId);
        }
    }
    
    // Сбрасываем значение input, чтобы можно было выбрать те же файлы снова
    document.getElementById('fileInput').value = '';
}

function addDefaultPreview(file, fileId) {
    filesToUpload.push({
        id: fileId,
        file: file
    });
    
    const previewItem = document.createElement('div');
    previewItem.className = 'preview-item';
    previewItem.innerHTML = `
        <div style="display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-file" style="color: #4f46e5; font-size: 24px;"></i>
            <div>
                <div>${file.name}</div>
                <div style="font-size: 12px; color: #64748b;">(${(file.size / 1024).toFixed(1)} KB)</div>
            </div>
        </div>
        <button class="remove-preview" onclick="removeFile('${fileId}')">×</button>
    `;
    
    document.getElementById('previewContainer').appendChild(previewItem);
}

// Удаление файла из превью
function removeFile(fileId) {
    // Освобождаем URL превью для изображений
    const fileData = filesToUpload.find(f => f.id === fileId);
    if (fileData && fileData.previewUrl) {
        URL.revokeObjectURL(fileData.previewUrl);
    }
    
    filesToUpload = filesToUpload.filter(f => f.id !== fileId);
    updatePreview();
}

// Загрузка файлов на сервер
async function uploadFiles(messageText) {
    const uploadProgress = document.getElementById('uploadProgress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    
    if (filesToUpload.length === 0) {
        sendTextMessage(messageText);
        return;
    }
    
    uploadProgress.style.display = 'block';
    
    try {
        const uploadedFiles = [];
        
        for (let i = 0; i < filesToUpload.length; i++) {
            const fileData = filesToUpload[i];
            const file = fileData.file;
            
            // Обновляем прогресс
            const progress = ((i + 1) / filesToUpload.length) * 100;
            progressFill.style.width = `${progress}%`;
            progressText.textContent = `Загрузка ${Math.round(progress)}%`;
            
            const formData = new FormData();
            formData.append('file', file);
            
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            
            if (result.url) {
                uploadedFiles.push(result);
            }
        }
        
        // Отправляем все файлы в одном сообщении
        if (uploadedFiles.length > 0) {
            socket.emit('file message', {
                message: messageText,
                files: uploadedFiles  // Отправляем массив файлов
            });
        }
        
        // Очищаем после успешной загрузки
        filesToUpload.forEach(fileData => {
            if (fileData.previewUrl) {
                URL.revokeObjectURL(fileData.previewUrl);
            }
        });
        
        filesToUpload = [];
        updatePreview();
        document.getElementById('messageInput').value = '';
        
    } catch (error) {
        console.error('Ошибка загрузки файла:', error);
        alert('Ошибка при загрузке файлов');
    } finally {
        uploadProgress.style.display = 'none';
        progressFill.style.width = '0%';
    }
}

        document.addEventListener('dragleave', function(e) {
            if (e.clientX <= 0 || e.clientY <= 0 || 
                e.clientX >= window.innerWidth || 
                e.clientY >= window.innerHeight) {
                isDragging = false;
                dragOverlay.style.display = 'none';
            }
        });

        messageInput.addEventListener('drop', function(e) {
            e.preventDefault();
            isDragging = false;
            dragOverlay.style.display = 'none';
            
            if (e.dataTransfer.files.length > 0) {
                handleFiles(e.dataTransfer.files);
            }
        });

        document.addEventListener('dragover', function(e) {
            e.preventDefault();
        });

        // Обработка файлов
        function handleFiles(fileList) {
            const previewContainer = document.getElementById('previewContainer');
            previewContainer.style.display = 'block';
            
            for (let file of fileList) {
                // Проверяем размер файла (10MB максимум)
                if (file.size > 10 * 1024 * 1024) {
                    alert(`Файл ${file.name} слишком большой (максимум 10MB)`);
                    continue;
                }
                
                const fileId = Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                filesToUpload.push({
                    id: fileId,
                    file: file
                });
                
                const previewItem = document.createElement('div');
                previewItem.className = 'preview-item';
                previewItem.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-file" style="color: #4f46e5;"></i>
                        <span>${file.name}</span>
                        <span style="font-size: 12px; color: #64748b;">(${(file.size / 1024).toFixed(1)} KB)</span>
                    </div>
                    <button class="remove-preview" onclick="removeFile('${fileId}')">×</button>
                `;
                
                previewContainer.appendChild(previewItem);
            }
            
            // Сбрасываем значение input, чтобы можно было выбрать те же файлы снова
            document.getElementById('fileInput').value = '';
        }

        // Удаление файла из превью
        function removeFile(fileId) {
            filesToUpload = filesToUpload.filter(f => f.id !== fileId);
            updatePreview();
        }

        // Обновление превью
        function updatePreview() {
            const previewContainer = document.getElementById('previewContainer');
            previewContainer.innerHTML = '';
            
            if (filesToUpload.length > 0) {
                previewContainer.style.display = 'block';
                filesToUpload.forEach(fileData => {
                    const file = fileData.file;
                    const previewItem = document.createElement('div');
                    previewItem.className = 'preview-item';
                    previewItem.innerHTML = `
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <i class="fas fa-file" style="color: #4f46e5;"></i>
                            <span>${file.name}</span>
                            <span style="font-size: 12px; color: #64748b;">(${(file.size / 1024).toFixed(1)} KB)</span>
                        </div>
                        <button class="remove-preview" onclick="removeFile('${fileData.id}')">×</button>
                    `;
                    previewContainer.appendChild(previewItem);
                });
            } else {
                previewContainer.style.display = 'none';
            }
        }

        // Загрузка файлов на сервер
        async function uploadFiles(messageText) {
            const uploadProgress = document.getElementById('uploadProgress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            if (filesToUpload.length === 0) {
                sendTextMessage(messageText);
                return;
            }
            
            uploadProgress.style.display = 'block';
            
            try {
                for (let i = 0; i < filesToUpload.length; i++) {
                    const fileData = filesToUpload[i];
                    const file = fileData.file;
                    
                    // Обновляем прогресс
                    const progress = ((i + 1) / filesToUpload.length) * 100;
                    progressFill.style.width = `${progress}%`;
                    progressText.textContent = `Загрузка ${Math.round(progress)}%`;
                    
                    const formData = new FormData();
                    formData.append('file', file);
                    
                    const response = await fetch('/upload', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (result.url) {
                        // Отправляем сообщение с файлом
                        socket.emit('file message', {
                            message: i === 0 ? messageText : '', // Текст только к первому файлу
                            file: result
                        });
                    }
                }
                
                // Очищаем после успешной загрузки
                filesToUpload = [];
                updatePreview();
                document.getElementById('messageInput').value = '';
                
            } catch (error) {
                console.error('Ошибка загрузки файла:', error);
                alert('Ошибка при загрузке файлов');
            } finally {
                uploadProgress.style.display = 'none';
                progressFill.style.width = '0%';
            }
        }

        // Отправка текстового сообщения
        function sendTextMessage(messageText) {
            if (messageText.trim()) {
                socket.emit('chat message', messageText.trim());
                document.getElementById('messageInput').value = '';
            }
        }

        // Основная функция отправки сообщения
        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const messageText = messageInput.value.trim();
            
            if (filesToUpload.length > 0 || messageText) {
                uploadFiles(messageText);
            }
        }

        // Отправка по Ctrl+Enter или Enter
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Авторазмер textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Ввод имени по Enter
        document.getElementById('usernameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                setUsername();
            }
        });

        // Получение истории чата
        socket.on('chat history', (history) => {
            const chatWindow = document.getElementById('chatWindow');
            history.forEach(msg => {
                displayMessage(msg);
            });
        });

        // Получение новых сообщений
        socket.on('chat message', (data) => {
            displayMessage(data);
        });

        // Обновление счетчика онлайн пользователей
        socket.on('user count', (count) => {
            onlineUsers = count;
            document.getElementById('onlineUsers').innerHTML = 
                `<i class="fas fa-user-friends"></i> Пользователей онлайн: ${count}`;
        });

        // Отображение сообщения
        function displayMessage(data) {
            const chatWindow = document.getElementById('chatWindow');
            const messageDiv = document.createElement('div');
            
            let messageClass = 'message ';
            if (data.type === 'system') {
                messageClass += 'system';
            } else if (data.username === username) {
                messageClass += 'user';
            } else {
                messageClass += 'other';
            }
            
            if (data.file) {
                messageClass += ' file';
            }
            
            const time = new Date(data.timestamp).toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            messageDiv.className = messageClass;
            
            let messageContent = '';
            if (data.file) {
                const file = data.file;
                if (file.type === 'image') {
                    messageContent = `
                        <div class="file-preview">
                            <img src="${file.url}" alt="${file.originalName}" onclick="viewImage('${file.url}')">
                        </div>
                        <div class="file-info">
                            <div class="file-icon">${file.icon}</div>
                            <div class="file-details">
                                <span class="file-name">${file.originalName}</span>
                                <span class="file-size">${(file.size / 1024).toFixed(1)} KB</span>
                            </div>
                            <a href="${file.url}" class="download-btn" download="${file.originalName}">
                                <i class="fas fa-download"></i>
                            </a>
                        </div>
                    `;
                } else {
                    messageContent = `
                        <div class="file-info">
                            <div class="file-icon">${file.icon}</div>
                            <div class="file-details">
                                <span class="file-name">${file.originalName}</span>
                                <span class="file-size">${(file.size / 1024).toFixed(1)} KB</span>
                            </div>
                            <a href="${file.url}" class="download-btn" download="${file.originalName}">
                                <i class="fas fa-download"></i>
                            </a>
                        </div>
                    `;
                }
                
                if (data.message) {
                    messageContent = `<div class="message-content">${data.message}</div>` + messageContent;
                }
            } else {
                messageContent = `<div class="message-content">${data.message}</div>`;
            }
            
            messageDiv.innerHTML = `
                <div class="message-header">
                    <span>${data.username}</span>
                    <span style="font-size: 0.8em; opacity: 0.8;">${time}</span>
                </div>
                ${messageContent}
            `;
            
            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Просмотр изображения в полном размере
        function viewImage(url) {
            document.getElementById('modalImage').src = url;
            document.getElementById('imageModal').style.display = 'flex';
        }

        // Закрытие модального окна с изображением
        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // Фокус на поле ввода имени при загрузке
        document.getElementById('usernameInput').focus();

        // Закрытие модального окна по клику вне его
        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeImageModal();
            }
        });
    </script>
</body>
</html>
