<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node.js Чат с файлами</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .chat-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 15px;
            border-radius: 15px;
            max-width: 70%;
            word-wrap: break-word;
            position: relative;
        }

        .message.user {
            background: #3b82f6;
            color: white;
            margin-left: auto;
        }

        .message.system {
            background: #e2e8f0;
            color: #475569;
            text-align: center;
            max-width: 90%;
            margin: 10px auto;
            font-style: italic;
        }

        .message.other {
            background: #f1f5f9;
            color: #334155;
        }

        .message.file {
            border: 2px dashed #cbd5e1;
        }

        .message-header {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .message-content {
            font-size: 1em;
            margin-bottom: 8px;
        }

        .file-preview {
            margin: 10px 0;
            border-radius: 10px;
            overflow: hidden;
        }

        .file-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .file-preview img:hover {
            transform: scale(1.02);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-top: 5px;
        }

        .file-icon {
            font-size: 24px;
        }

        .file-details {
            flex: 1;
        }

        .file-name {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .file-size {
            font-size: 0.8em;
            opacity: 0.7;
        }

        .download-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9em;
        }

        .download-btn:hover {
            background: #2563eb;
        }

        .message-time {
            font-size: 0.8em;
            opacity: 0.7;
            margin-top: 5px;
            text-align: right;
        }

        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .message-input-container {
            flex: 1;
            position: relative;
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            padding-right: 40px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            font-family: Arial, sans-serif;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .file-upload-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .file-upload-btn:hover {
            transform: translateY(-2px);
        }

        .send-btn {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
        }

        .file-input {
            display: none;
        }

        .upload-progress {
            margin-top: 10px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 12px;
            color: #64748b;
            text-align: center;
        }

        .preview-container {
            margin-top: 10px;
            padding: 10px;
            border: 2px dashed #cbd5e1;
            border-radius: 10px;
            background: #f8fafc;
            display: none;
        }

        .preview-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            margin-bottom: 5px;
            background: white;
            border-radius: 5px;
        }

        .remove-preview {
            background: #ef4444;
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
        }

        .username-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #334155;
        }

        .online-users {
            padding: 10px 20px;
            background: #f1f5f9;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
            color: #64748b;
            flex-shrink: 0;
        }

        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        .drag-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(59, 130, 246, 0.8);
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            z-index: 1500;
            pointer-events: none;
        }

        .drag-overlay i {
            font-size: 48px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .chat-container {
                height: 95vh;
                max-width: 100%;
            }
            
            .message {
                max-width: 85%;
            }
            
            .input-wrapper {
                flex-direction: column;
            }
            
            .file-upload-btn, .send-btn {
                width: 100%;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div id="dragOverlay" class="drag-overlay">
        <div style="text-align: center;">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Перетащите файлы сюда</p>
        </div>
    </div>

    <div id="imageModal" class="image-modal">
        <button class="close-modal" onclick="closeImageModal()">×</button>
        <img id="modalImage" src="" alt="Просмотр изображения">
    </div>

    <div id="usernameModal" class="username-modal">
        <div class="modal-content">
            <h2>Добро пожаловать в чат!</h2>
            <input type="text" id="usernameInput" placeholder="Введите ваше имя" autocomplete="off">
            <button onclick="setUsername()" style="margin-top: 20px; width: 100%;">
                Войти в чат
            </button>
        </div>
    </div>

    <div class="chat-container">
        <div class="header">
            <h1><i class="fas fa-comments"></i> Node.js Чат</h1>
            <p>Общайтесь, отправляйте фото и файлы</p>
        </div>
        
        <div id="onlineUsers" class="online-users">
            <i class="fas fa-user-friends"></i> Пользователей онлайн: 1
        </div>
        
        <div class="chat-window" id="chatWindow">
            <!-- Сообщения будут здесь -->
        </div>
        
        <div class="input-area">
            <div class="preview-container" id="previewContainer"></div>
            
            <div class="upload-progress" id="uploadProgress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Загрузка 0%</div>
            </div>
            
            <div class="input-wrapper">
                <div class="message-input-container">
                    <textarea 
                        id="messageInput" 
                        placeholder="Введите сообщение или перетащите файлы..." 
                        autocomplete="off" 
                        disabled
                        rows="1"
                    ></textarea>
                    <input type="file" id="fileInput" class="file-input" multiple>
                </div>
                
                <button class="file-upload-btn" onclick="openFilePicker()" id="fileButton" disabled>
                    <i class="fas fa-paperclip"></i>
                </button>
                
                <button class="send-btn" onclick="sendMessage()" id="sendButton" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
    (function() {
        'use strict';

        const socket = io();
        let username = '';
        let filesToUpload = [];
        let isSending = false; // Защита от двойной отправки

        // DOM элементы
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const fileButton = document.getElementById('fileButton');
        const fileInput = document.getElementById('fileInput');
        const usernameModal = document.getElementById('usernameModal');
        const usernameInput = document.getElementById('usernameInput');
        const previewContainer = document.getElementById('previewContainer');
        const uploadProgress = document.getElementById('uploadProgress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const dragOverlay = document.getElementById('dragOverlay');
        const imageModal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const chatWindow = document.getElementById('chatWindow');
        const onlineUsersDiv = document.getElementById('onlineUsers');

        // ========== ИМЯ ПОЛЬЗОВАТЕЛЯ ==========
        window.setUsername = function() {
            const name = usernameInput.value.trim();
            if (!name) return;
            
            username = name;
            socket.emit('set username', username);
            usernameModal.style.display = 'none';
            messageInput.disabled = false;
            sendButton.disabled = false;
            fileButton.disabled = false;
            messageInput.focus();
        };

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') setUsername();
        });

        // ========== ВЫБОР ФАЙЛОВ ==========
        window.openFilePicker = function() {
            fileInput.click();
        };

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFiles(e.target.files);
            }
            fileInput.value = ''; // Сброс для повторного выбора того же файла
        });

        // ========== DRAG & DROP ==========
        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragOverlay.style.display = 'flex';
        });
        dragOverlay.addEventListener('dragover', (e) => e.preventDefault());
        dragOverlay.addEventListener('dragleave', () => {
            dragOverlay.style.display = 'none';
        });
        dragOverlay.addEventListener('drop', (e) => {
            e.preventDefault();
            dragOverlay.style.display = 'none';
            if (e.dataTransfer.files.length > 0) {
                handleFiles(e.dataTransfer.files);
            }
        });

        // ========== ОБРАБОТКА ФАЙЛОВ ==========
        function handleFiles(fileList) {
            previewContainer.style.display = 'block';

            for (const file of fileList) {
                if (file.size > 10 * 1024 * 1024) {
                    alert(`Файл "${file.name}" слишком большой (максимум 10MB)`);
                    continue;
                }

                const fileId = Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                const fileData = { id: fileId, file: file };

                if (file.type.startsWith('image/')) {
                    fileData.previewUrl = URL.createObjectURL(file);
                }

                filesToUpload.push(fileData);
                addPreviewElement(fileData);
            }
        }

        function addPreviewElement(fileData) {
            const file = fileData.file;
            const previewItem = document.createElement('div');
            previewItem.className = 'preview-item';
            previewItem.dataset.fileId = fileData.id;

            const iconHtml = file.type.startsWith('image/')
                ? `<img src="${fileData.previewUrl}" style="width:40px;height:40px;object-fit:cover;border-radius:5px;">`
                : `<i class="fas fa-file" style="color:#4f46e5;font-size:24px;"></i>`;

            previewItem.innerHTML = `
                <div style="display:flex;align-items:center;gap:10px;">
                    ${iconHtml}
                    <div>
                        <div>${file.name}</div>
                        <div style="font-size:12px;color:#64748b;">(${(file.size / 1024).toFixed(1)} KB)</div>
                    </div>
                </div>
                <button class="remove-preview" data-fileid="${fileData.id}">×</button>
            `;

            previewItem.querySelector('.remove-preview').addEventListener('click', (e) => {
                const id = e.target.dataset.fileid;
                removeFile(id);
            });

            previewContainer.appendChild(previewItem);
        }

        window.removeFile = function(fileId) {
            const fileData = filesToUpload.find(f => f.id === fileId);
            if (fileData?.previewUrl) {
                URL.revokeObjectURL(fileData.previewUrl);
            }
            filesToUpload = filesToUpload.filter(f => f.id !== fileId);

            const previewItem = previewContainer.querySelector(`[data-file-id="${fileId}"]`);
            if (previewItem) previewItem.remove();

            if (filesToUpload.length === 0) {
                previewContainer.style.display = 'none';
            }
        };

        // ========== ОТПРАВКА СООБЩЕНИЯ ==========
        async function sendMessage() {
            // Защита от двойного вызова
            if (isSending) {
                console.warn('Отправка уже выполняется, подождите...');
                return;
            }

            const messageText = messageInput.value.trim();

            // Нечего отправлять
            if (filesToUpload.length === 0 && !messageText) return;

            isSending = true;
            sendButton.disabled = true;

            try {
                if (filesToUpload.length > 0) {
                    await uploadFilesAndSend(messageText);
                } else {
                    sendTextMessage(messageText);
                }
            } catch (error) {
                console.error('Ошибка при отправке:', error);
                alert('Ошибка при отправке сообщения. Попробуйте ещё раз.');
            } finally {
                isSending = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        async function uploadFilesAndSend(messageText) {
            uploadProgress.style.display = 'block';

            try {
                for (let i = 0; i < filesToUpload.length; i++) {
                    const fileData = filesToUpload[i];
                    const file = fileData.file;

                    // Обновляем прогресс
                    const percent = ((i + 1) / filesToUpload.length) * 100;
                    progressFill.style.width = `${percent}%`;
                    progressText.textContent = `Загрузка ${Math.round(percent)}% (${i + 1}/${filesToUpload.length})`;

                    console.log(`Загружаем файл ${i + 1}/${filesToUpload.length}: ${file.name}`);

                    const formData = new FormData();
                    formData.append('file', file);

                    const response = await fetch('/upload', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error || 'Ошибка загрузки');
                    }

                    const result = await response.json();
                    console.log('Файл загружен:', result);

                    // Отправляем файловое сообщение
                    // Текст добавляем только к первому файлу
                    socket.emit('file message', {
                        message: (i === 0 ? messageText : ''),
                        file: result
                    });
                }

                // Очистка после успешной отправки
                filesToUpload.forEach(f => {
                    if (f.previewUrl) URL.revokeObjectURL(f.previewUrl);
                });
                filesToUpload = [];
                previewContainer.innerHTML = '';
                previewContainer.style.display = 'none';
                messageInput.value = '';

            } catch (error) {
                console.error('Ошибка загрузки файла:', error);
                alert(`Ошибка: ${error.message}`);
            } finally {
                uploadProgress.style.display = 'none';
                progressFill.style.width = '0%';
                progressText.textContent = 'Загрузка 0%';
            }
        }

        function sendTextMessage(text) {
            if (!text) return;
            socket.emit('chat message', text);
            messageInput.value = '';
        }

        // ========== ОБРАБОТЧИКИ ОТПРАВКИ ==========
        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        // ========== ПОЛУЧЕНИЕ СООБЩЕНИЙ ==========
        socket.on('chat history', (history) => {
            chatWindow.innerHTML = '';
            history.forEach(msg => displayMessage(msg));
        });

        socket.on('chat message', (data) => {
            displayMessage(data);
        });

        socket.on('user count', (count) => {
            onlineUsersDiv.innerHTML = `<i class="fas fa-user-friends"></i> Пользователей онлайн: ${count}`;
        });

        // ========== ОТОБРАЖЕНИЕ СООБЩЕНИЯ ==========
        function displayMessage(data) {
            const messageDiv = document.createElement('div');
            let messageClass = 'message ';

            if (data.type === 'system') {
                messageClass += 'system';
            } else if (data.username === username) {
                messageClass += 'user';
            } else {
                messageClass += 'other';
            }

            if (data.file) messageClass += ' file';

            const time = new Date(data.timestamp).toLocaleTimeString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit'
            });

            let contentHtml = data.message ? `<div class="message-content">${escapeHtml(data.message)}</div>` : '';

            if (data.file) {
                const file = data.file;
                if (file.type === 'image') {
                    contentHtml += `
                        <div class="file-preview">
                            <img src="${file.url}" alt="${escapeHtml(file.originalName)}" onclick="viewImage('${file.url}')">
                        </div>
                    `;
                }
                contentHtml += `
                    <div class="file-info">
                        <div class="file-icon">${file.icon || '📎'}</div>
                        <div class="file-details">
                            <span class="file-name">${escapeHtml(file.originalName)}</span>
                            <span class="file-size">${(file.size / 1024).toFixed(1)} KB</span>
                        </div>
                        <a href="${file.url}" class="download-btn" download="${escapeHtml(file.originalName)}">
                            <i class="fas fa-download"></i>
                        </a>
                    </div>
                `;
            }

            messageDiv.className = messageClass;
            messageDiv.innerHTML = `
                <div class="message-header">
                    <span>${escapeHtml(data.username)}</span>
                    <span style="font-size:0.8em;opacity:0.8;">${time}</span>
                </div>
                ${contentHtml}
            `;

            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Простая защита от XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== ПРОСМОТР ИЗОБРАЖЕНИЙ ==========
        window.viewImage = function(url) {
            modalImage.src = url;
            imageModal.style.display = 'flex';
        };

        window.closeImageModal = function() {
            imageModal.style.display = 'none';
        };

        imageModal.addEventListener('click', (e) => {
            if (e.target === imageModal) closeImageModal();
        });

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        usernameInput.focus();
    })();
</script>
</body>
</html>
